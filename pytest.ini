[pytest]
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    pipes: requires the 'pipes' extra (luigi)
    connectors: requires the 'connectors' extra (aiohttp, aiofiles, requests, ...)
    lucidspark: requires the 'lucidspark' extra (networkx, treelib)
    llm: requires the 'llm' extra (langchain, openai, ...)
    git: requires the 'git' extra (GitPython)
filterwarnings =
    ignore:Pydantic V1 style.*:pydantic.warnings.PydanticDeprecatedSince20:langchain_community.llms.azureml_endpoint
    ignore:The configuration option.*:pytest.PytestDeprecationWarning:pytest_asyncio.plugin
asyncio_default_fixture_loop_scope = function
