name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests-core:
    name: Core lane (minimal install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install core + dev dependencies
        run: uv sync --extra dev

      - name: Verify core import contract
        run: uv run python -c "import totodev_pub"

      - name: Run core lane
        env:
          PYTHONPATH: src
        run: uv run pytest -m "not pipes and not connectors and not lucidspark and not llm and not git"

  tests-full:
    name: Full lane (all extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.11

      - name: Install all runtime + dev dependencies
        run: uv sync --extra dev --extra all

      - name: Run full suite
        env:
          PYTHONPATH: src
        run: uv run pytest
